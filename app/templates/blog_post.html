{% extends "base.html" %}
{% block title %}Article â€” Cure My Nation{% endblock %}
{% block body %}
<!-- Show sidebar if logged in -->
<div class="flex h-screen overflow-hidden">
  <div id="sidebar-wrapper"></div>
  <div class="flex-1 flex flex-col overflow-auto" id="main-wrapper">
    <!-- Public topbar (shown when not logged in) -->
    <nav id="public-nav" class="bg-[#1E3A8A] text-white px-6 py-4 flex items-center justify-between sticky top-0 z-20">
      <a href="{{ APP_BASE }}/" class="flex items-center gap-2 font-bold">
        <div class="w-7 h-7 rounded bg-[#F97316] flex items-center justify-center font-bold">C</div>
        Cure My Nation
      </a>
      <div class="flex gap-4 text-sm">
        <a href="{{ APP_BASE }}/resources" class="text-blue-200 hover:text-white">â† All Articles</a>
        <a href="{{ APP_BASE }}/login" class="font-semibold">Login</a>
      </div>
    </nav>

    <main class="flex-1 p-6">
      <div id="loading" class="flex justify-center py-16"><div class="w-8 h-8 spinner"></div></div>
      <div id="content" class="hidden max-w-3xl mx-auto">
        <div class="mb-4">
          <a href="{{ APP_BASE }}/resources" class="text-sm text-[#1E3A8A] hover:underline">â† Back to Resources</a>
        </div>
        <div class="card p-0 overflow-hidden">
          <div id="blog-image"></div>
          <div class="p-8">
            <div class="flex items-center gap-3 mb-4">
              <span id="blog-category" class="text-xs font-medium text-[#F97316] bg-orange-50 px-2 py-0.5 rounded-full"></span>
              <span id="blog-date" class="text-xs text-gray-400"></span>
            </div>
            <h1 id="blog-title" class="text-2xl md:text-3xl font-extrabold text-gray-900 mb-2"></h1>
            <p id="blog-description" class="text-lg text-gray-500 mb-6"></p>
            <div class="flex items-center gap-2 pb-6 border-b border-gray-100 mb-6">
              <div class="w-8 h-8 rounded-full bg-[#1E3A8A] flex items-center justify-center text-white text-xs font-bold" id="author-avatar"></div>
              <span class="text-sm text-gray-600">By <span id="blog-author" class="font-medium"></span></span>
            </div>
            <div id="blog-content" class="prose prose-blue max-w-none text-gray-700 leading-relaxed text-sm space-y-4"></div>
          </div>
        </div>
      </div>
      <div id="not-found" class="hidden text-center py-16">
        <p class="text-gray-400 mb-4">Article not found.</p>
        <a href="{{ APP_BASE }}/resources" class="text-[#1E3A8A] hover:underline">â† Back to Resources</a>
      </div>
    </main>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const blogId = '{{ blog_id }}';

async function loadBlog() {
  const res = await fetch(`${window.APP_BASE || ''}/api/blogs/${blogId}`);
  document.getElementById('loading').classList.add('hidden');
  if (!res.ok) { document.getElementById('not-found').classList.remove('hidden'); return; }
  const { blog } = await res.json();

  if (blog.imageBase64) {
    document.getElementById('blog-image').innerHTML = `<img src="${blog.imageBase64}" class="w-full max-h-64 object-cover" />`;
  }
  document.getElementById('blog-category').textContent   = blog.category || 'General';
  document.getElementById('blog-date').textContent       = App.formatDate(blog.createdAt);
  document.getElementById('blog-title').textContent      = blog.title;
  document.getElementById('blog-description').textContent= blog.description || '';
  document.getElementById('blog-author').textContent     = blog.author || 'Admin';
  document.getElementById('author-avatar').textContent   = (blog.author||'A').charAt(0).toUpperCase();
  // Render content as plain text (newlines â†’ paragraphs)
  document.getElementById('blog-content').innerHTML = blog.content.split('\n\n').map(p => `<p>${App.esc(p)}</p>`).join('');

  document.getElementById('content').classList.remove('hidden');
}

// Show sidebar if logged in
const token = localStorage.getItem('cmn_token');
if (token) {
  document.getElementById('public-nav').classList.add('hidden');
  document.getElementById('main-wrapper').classList.add('lg:ml-64');
  // Dynamically load sidebar
  fetch((window.APP_BASE || '') + '/resources').then(r => r.text()).then(html => {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');
    const sidebar = doc.getElementById('sidebar');
    if (sidebar) document.getElementById('sidebar-wrapper').innerHTML = sidebar.outerHTML;
  }).catch(() => {});
}

loadBlog();
</script>
{% endblock %}
