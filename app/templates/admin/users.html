{% extends "base.html" %}
{% block title %}Manage Users — Admin{% endblock %}
{% block body %}
<div class="flex h-screen overflow-hidden">
  {% include 'partials/sidebar.html' %}
  <div class="flex-1 lg:ml-64 flex flex-col overflow-auto">
    <header class="bg-white border-b border-gray-200 px-6 py-4 sticky top-0 z-20 flex items-center gap-3">
      <button onclick="toggleSidebar()" class="lg:hidden text-gray-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg></button>
      <h1 class="font-bold text-gray-900 text-lg">Manage Users</h1>
    </header>

    <main class="flex-1 p-6">
      <div class="card mb-4">
        <input id="search" oninput="applyFilter()" type="text" placeholder="Search by name or email…" class="input-field w-full max-w-sm" />
      </div>

      <div class="card p-0 overflow-hidden">
        <div id="loading" class="flex justify-center py-16"><div class="w-8 h-8 spinner"></div></div>
        <table id="users-table" class="hidden w-full text-sm">
          <thead class="bg-gray-50 border-b">
            <tr>
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-500 uppercase">User</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Email</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-500 uppercase">State</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Role</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Joined</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Actions</th>
            </tr>
          </thead>
          <tbody id="users-body" class="divide-y divide-gray-50"></tbody>
        </table>
        <div id="empty" class="hidden text-center py-12 text-gray-400 text-sm">No users found.</div>
      </div>
    </main>
  </div>
</div>

<!-- Change Role Modal -->
<div id="role-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/40 p-4">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6">
    <h2 class="text-lg font-bold text-gray-900 mb-1">Change Role</h2>
    <p id="modal-user-name" class="text-sm text-gray-500 mb-5"></p>

    <label class="block text-sm font-medium text-gray-700 mb-1.5">New role</label>
    <select id="modal-role" class="input-field w-full mb-6">
      <option value="user">User (regular member)</option>
      <option value="admin">Admin</option>
      <option value="superAdmin">Super Admin</option>
    </select>

    <div class="flex gap-3 justify-end">
      <button onclick="closeRoleModal()" class="btn-secondary px-4 py-2 text-sm">Cancel</button>
      <button onclick="saveRole()" id="save-role-btn" class="btn-primary px-4 py-2 text-sm flex items-center gap-2">
        <span id="save-role-text">Save</span>
        <span id="save-role-spinner" class="hidden w-4 h-4 spinner"></span>
      </button>
    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
App.requireAuth(true);
App.initSidebar('admin_users');

let allUsers = [];
let currentUser = null;
let roleTargetId = null;

async function loadUsers() {
  const me = App.getUser();
  currentUser = me;
  const res = await App.api('/api/auth/users');
  document.getElementById('loading').classList.add('hidden');
  if (!res.ok) { App.toast('Failed to load users', 'error'); return; }
  const data = await res.json();
  allUsers = data.users || [];
  applyFilter();
  document.getElementById('users-table').classList.remove('hidden');
}

function applyFilter() {
  const search = document.getElementById('search').value.toLowerCase();
  const filtered = allUsers.filter(u =>
    !search ||
    (u.firstName||'').toLowerCase().includes(search) ||
    (u.lastName||'').toLowerCase().includes(search)  ||
    (u.email||'').toLowerCase().includes(search)
  );
  const tbody = document.getElementById('users-body');
  const empty = document.getElementById('empty');
  if (!filtered.length) { tbody.innerHTML = ''; empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');
  const isSuperAdmin = currentUser && currentUser.adminRole === 'superAdmin';
  tbody.innerHTML = filtered.map(u => {
    const initials = `${u.firstName?.charAt(0)||''}${u.lastName?.charAt(0)||''}`.toUpperCase() || '?';
    const roleBadge = u.adminRole === 'superAdmin'
      ? '<span class="badge-resolved">Super Admin</span>'
      : u.isAdmin
        ? '<span class="badge-inProgress">Admin</span>'
        : '<span class="badge-reported">User</span>';
    const selfRow = currentUser && u.id === currentUser.id;
    const actionBtn = isSuperAdmin && !selfRow
      ? `<button onclick="openRoleModal('${u.id}','${App.esc(u.firstName+' '+u.lastName)}','${u.adminRole === 'superAdmin' ? 'superAdmin' : u.isAdmin ? 'admin' : 'user'}')"
           class="text-xs px-3 py-1.5 rounded-lg border border-[#1E3A8A] text-[#1E3A8A] hover:bg-[#1E3A8A] hover:text-white transition font-medium">
           Change Role
         </button>`
      : '<span class="text-gray-300 text-xs">—</span>';
    return `
    <tr class="hover:bg-gray-50 transition">
      <td class="px-5 py-4">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-full bg-[#1E3A8A] flex items-center justify-center text-white text-xs font-bold flex-shrink-0">${App.esc(initials)}</div>
          <div class="font-medium text-gray-900">${App.esc((u.firstName||'') + ' ' + (u.lastName||''))}</div>
        </div>
      </td>
      <td class="px-5 py-4 text-gray-600">${App.esc(u.email)}</td>
      <td class="px-5 py-4 text-gray-500">${App.esc(u.state||'—')}</td>
      <td class="px-5 py-4">${roleBadge}</td>
      <td class="px-5 py-4 text-gray-400 text-xs">${App.formatDate(u.createdAt)}</td>
      <td class="px-5 py-4">${actionBtn}</td>
    </tr>`;
  }).join('');
}

function openRoleModal(userId, userName, currentRole) {
  roleTargetId = userId;
  document.getElementById('modal-user-name').textContent = userName;
  document.getElementById('modal-role').value = currentRole;
  document.getElementById('role-modal').classList.remove('hidden');
}

function closeRoleModal() {
  roleTargetId = null;
  document.getElementById('role-modal').classList.add('hidden');
}

async function saveRole() {
  if (!roleTargetId) return;
  const role = document.getElementById('modal-role').value;
  const btn = document.getElementById('save-role-btn');
  document.getElementById('save-role-text').textContent = 'Saving…';
  document.getElementById('save-role-spinner').classList.remove('hidden');
  btn.disabled = true;

  const res = await App.api(`/api/auth/users/${roleTargetId}/change-role`, {
    method: 'PUT',
    body: JSON.stringify({ role }),
  });
  const data = await res.json();

  document.getElementById('save-role-text').textContent = 'Save';
  document.getElementById('save-role-spinner').classList.add('hidden');
  btn.disabled = false;

  if (res.ok && data.success) {
    App.toast('Role updated successfully', 'success');
    closeRoleModal();
    loadUsers();
  } else {
    App.toast(data.message || 'Failed to update role', 'error');
  }
}

// Close modal on backdrop click
document.getElementById('role-modal').addEventListener('click', function(e) {
  if (e.target === this) closeRoleModal();
});

loadUsers();
</script>
{% endblock %}
