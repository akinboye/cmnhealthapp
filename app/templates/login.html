{% extends "base.html" %}
{% block title %}Login — Cure My Nation{% endblock %}
{% block body %}
<div class="min-h-screen bg-gradient-to-br from-[#1E3A8A] via-[#1E40AF] to-[#3B82F6] flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
      <!-- Header -->
      <div class="bg-[#1E3A8A] px-8 py-8 text-center">
        <div class="w-14 h-14 rounded-2xl bg-[#F97316] flex items-center justify-center mx-auto mb-4 text-white font-extrabold text-2xl shadow-lg">C</div>
        <h1 class="text-white font-bold text-2xl">Welcome back</h1>
        <p class="text-blue-200 text-sm mt-1">Sign in to your account</p>
      </div>

      <!-- Form -->
      <div class="px-8 py-8">
        <div id="error-banner" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3"></div>

        <form id="login-form" class="space-y-5" novalidate>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Email address</label>
            <input id="email" type="email" required autocomplete="email" maxlength="254"
              class="input-field" placeholder="you@example.com" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
            <div class="relative">
              <input id="password" type="password" required autocomplete="current-password" maxlength="128"
                class="input-field pr-10" placeholder="••••••••" />
              <button type="button" onclick="togglePwd()" class="absolute right-3 top-2.5 text-gray-400 hover:text-gray-600">
                <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </button>
            </div>
            <div class="text-right mt-1.5">
              <a href="{{ APP_BASE }}/forgot-password" class="text-xs text-[#1E3A8A] hover:underline">Forgot password?</a>
            </div>
          </div>

          <button type="submit" id="login-btn" class="btn-primary w-full flex items-center justify-center gap-2">
            <span id="btn-text">Sign In</span>
            <span id="btn-spinner" class="hidden w-4 h-4 spinner"></span>
          </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
          Don't have an account?
          <a href="{{ APP_BASE }}/register" class="text-[#1E3A8A] font-semibold hover:underline">Create one</a>
        </p>
        <p class="text-center mt-3">
          <a href="{{ APP_BASE }}/" class="text-sm text-gray-400 hover:text-gray-600">← Back to home</a>
        </p>
      </div>
    </div>
  </div>
</div>

<script>
function togglePwd() {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const errBanner = document.getElementById('error-banner');

  errBanner.classList.add('hidden');
  btn.disabled = true;
  document.getElementById('btn-text').textContent = 'Signing in…';
  document.getElementById('btn-spinner').classList.remove('hidden');

  try {
    const res = await fetch((window.APP_BASE || '') + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (data.success) {
      localStorage.setItem('cmn_token', data.token);
      localStorage.setItem('cmn_user', JSON.stringify(data.user));
      window.location.href = data.user.isAdmin ? '/admin' : '/dashboard';
    } else {
      errBanner.textContent = data.message || 'Login failed. Please try again.';
      errBanner.classList.remove('hidden');
    }
  } catch (err) {
    errBanner.textContent = 'Network error — is the server running?';
    errBanner.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    document.getElementById('btn-text').textContent = 'Sign In';
    document.getElementById('btn-spinner').classList.add('hidden');
  }
});

// Redirect if already logged in
if (localStorage.getItem('cmn_token')) window.location.href = (window.APP_BASE || '') + '/dashboard';
</script>
{% endblock %}
