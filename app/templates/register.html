{% extends "base.html" %}
{% block title %}Create Account â€” Cure My Nation{% endblock %}
{% block body %}
<div class="min-h-screen bg-gradient-to-br from-[#1E3A8A] via-[#1E40AF] to-[#3B82F6] flex items-center justify-center p-4">
  <div class="w-full max-w-lg">
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
      <div class="bg-[#1E3A8A] px-8 py-6 text-center">
        <div class="w-14 h-14 rounded-2xl bg-[#F97316] flex items-center justify-center mx-auto mb-3 text-white font-extrabold text-2xl shadow-lg">C</div>
        <h1 class="text-white font-bold text-2xl">Create your account</h1>
        <p class="text-blue-200 text-sm mt-1">Join thousands protecting their health rights</p>
      </div>

      <div class="px-8 py-8">
        <div id="error-banner" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3"></div>

        <form id="register-form" class="space-y-4" novalidate>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">First name *</label>
              <input id="firstName" type="text" required class="input-field" placeholder="John" maxlength="100" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1.5">Last name *</label>
              <input id="lastName" type="text" required class="input-field" placeholder="Doe" maxlength="100" />
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Email address *</label>
            <input id="email" type="email" required class="input-field" placeholder="you@example.com" maxlength="254" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Phone number</label>
            <input id="phone" type="tel" class="input-field" placeholder="+234 800 000 0000" maxlength="30" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">State *</label>
            <select id="state" required class="input-field">
              <option value="">Select your state</option>
              <option>Abia</option><option>Adamawa</option><option>Akwa Ibom</option>
              <option>Anambra</option><option>Bauchi</option><option>Bayelsa</option>
              <option>Benue</option><option>Borno</option><option>Cross River</option>
              <option>Delta</option><option>Ebonyi</option><option>Edo</option>
              <option>Ekiti</option><option>Enugu</option><option>FCT (Abuja)</option>
              <option>Gombe</option><option>Imo</option><option>Jigawa</option>
              <option>Kaduna</option><option>Kano</option><option>Katsina</option>
              <option>Kebbi</option><option>Kogi</option><option>Kwara</option>
              <option>Lagos</option><option>Nasarawa</option><option>Niger</option>
              <option>Ogun</option><option>Ondo</option><option>Osun</option>
              <option>Oyo</option><option>Plateau</option><option>Rivers</option>
              <option>Sokoto</option><option>Taraba</option><option>Yobe</option>
              <option>Zamfara</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Password *</label>
            <input id="password" type="password" required class="input-field" placeholder="At least 8 characters" maxlength="128" autocomplete="new-password" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">Confirm password *</label>
            <input id="confirm-password" type="password" required class="input-field" placeholder="Repeat your password" maxlength="128" autocomplete="new-password" />
          </div>

          <button type="submit" id="register-btn" class="btn-primary w-full flex items-center justify-center gap-2 mt-2">
            <span id="btn-text">Create Account</span>
            <span id="btn-spinner" class="hidden w-4 h-4 spinner"></span>
          </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
          Already have an account?
          <a href="{{ APP_BASE }}/login" class="text-[#1E3A8A] font-semibold hover:underline">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>

<script>
document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errBanner = document.getElementById('error-banner');
  errBanner.classList.add('hidden');

  const firstName = document.getElementById('firstName').value.trim();
  const lastName  = document.getElementById('lastName').value.trim();
  const email     = document.getElementById('email').value.trim();
  const phone     = document.getElementById('phone').value.trim();
  const state     = document.getElementById('state').value;
  const password  = document.getElementById('password').value;
  const confirm   = document.getElementById('confirm-password').value;

  if (!firstName || !lastName || !email || !state || !password) {
    errBanner.textContent = 'Please fill in all required fields.';
    errBanner.classList.remove('hidden');
    return;
  }
  if (password !== confirm) {
    errBanner.textContent = 'Passwords do not match.';
    errBanner.classList.remove('hidden');
    return;
  }
  if (password.length < 8 || !/[a-zA-Z]/.test(password) || !/[0-9]/.test(password)) {
    errBanner.textContent = 'Password must be at least 8 characters and contain a letter and a number.';
    errBanner.classList.remove('hidden');
    return;
  }

  const btn = document.getElementById('register-btn');
  btn.disabled = true;
  document.getElementById('btn-text').textContent = 'Creating accountâ€¦';
  document.getElementById('btn-spinner').classList.remove('hidden');

  try {
    const res = await fetch((window.APP_BASE || '') + '/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ firstName, lastName, email, phone, state, password }),
    });
    const data = await res.json();
    if (data.success) {
      localStorage.setItem('cmn_token', data.token);
      localStorage.setItem('cmn_user', JSON.stringify(data.user));
      window.location.href = (window.APP_BASE || '') + '/dashboard';
    } else {
      errBanner.textContent = data.message || 'Registration failed.';
      errBanner.classList.remove('hidden');
    }
  } catch (err) {
    errBanner.textContent = 'Network error â€” is the server running?';
    errBanner.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    document.getElementById('btn-text').textContent = 'Create Account';
    document.getElementById('btn-spinner').classList.add('hidden');
  }
});

if (localStorage.getItem('cmn_token')) window.location.href = (window.APP_BASE || '') + '/dashboard';
</script>
{% endblock %}
